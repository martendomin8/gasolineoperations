# Nixpacks build config for the AIS ingest worker.
#
# `tsx` is a runtime dependency (moved out of devDependencies in
# package.json) because the worker runs TypeScript directly via
# `npx tsx scripts/ais-ingest/worker.ts` — no build step compiles to
# JS. This lets plain `npm ci` install everything the worker needs,
# which is what Nixpacks runs by default under NODE_ENV=production.
#
# Explicitly override the build phase to a no-op — by default Nixpacks
# detects the `build` script in package.json and runs `npm run build`,
# which triggers `next build`. That's the Next.js app's build step, not
# relevant to the worker, and it fails at build time because server
# env vars (NEXTAUTH_URL, DATABASE_URL, etc.) aren't present during
# Nixpacks' build phase. Skipping it entirely is correct for this
# service — the worker runs from source.

[phases.setup]
nixPkgs = ["nodejs_22"]

# Use `npm install` rather than `npm ci`. Nixpacks' default install
# command is `npm ci`, but on Railway's sandboxed builder that call
# has been observed to exit with status 1 and the npm-usage help dump
# — likely a cache-mount / lockfile-version interaction. `npm install`
# is more forgiving (reconciles the lockfile instead of erroring out)
# and produces the same node_modules for a frozen lockfile anyway.
[phases.install]
cmds = ["npm install --no-audit --no-fund"]

[phases.build]
cmds = ["echo \"Skipping Next.js build — this is the AIS worker service.\""]

[start]
cmd = "npm run ais:worker"
