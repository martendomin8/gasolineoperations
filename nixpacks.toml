# Nixpacks build config for the AIS ingest worker.
#
# `tsx` is a runtime dependency (moved out of devDependencies in
# package.json) because the worker runs TypeScript directly via
# `npx tsx scripts/ais-ingest/worker.ts` — no build step compiles to
# JS. This lets plain `npm ci` install everything the worker needs,
# which is what Nixpacks runs by default under NODE_ENV=production.

[phases.setup]
nixPkgs = ["nodejs_22"]

[start]
cmd = "npm run ais:worker"
